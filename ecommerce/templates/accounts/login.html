{% extends 'base.html' %}
{% block title %}Login - Flipzon{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <div class="text-center mb-4">
                    <i class="fas fa-user-circle fa-4x text-primary"></i>
                    <h3 class="fw-bold mt-3">Welcome Back</h3>
                    <p class="text-muted">Sign in to your account</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                        </div>
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger">Invalid username or password. Please try again.</div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                <hr>
                <p class="text-center mb-0">Don't have an account? <a href="{% url 'accounts:register' %}" class="fw-bold">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
