{% extends 'base.html' %}
{% block title %}My Profile - Flipzon{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row g-4">
        <div class="col-md-3">
            <div class="card p-4 text-center">
                <i class="fas fa-user-circle fa-5x text-primary mb-3"></i>
                <h5 class="fw-bold">{{ user.get_full_name|default:user.username }}</h5>
                <p class="text-muted mb-3">@{{ user.username }}</p>
                <a href="{% url 'orders:order_list' %}" class="btn btn-outline-primary w-100 mb-2">
                    <i class="fas fa-box me-2"></i>My Orders
                </a>
                <a href="{% url 'accounts:logout' %}" class="btn btn-outline-danger w-100">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </a>
            </div>
        </div>
        <div class="col-md-9">
            <div class="card p-4">
                <h5 class="fw-bold mb-4">Edit Profile</h5>
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">First Name</label>
                            <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Last Name</label>
                            <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" name="email" class="form-control" value="{{ user.email }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Username</label>
                            <input type="text" class="form-control" value="{{ user.username }}" disabled>
                            <small class="text-muted">Username cannot be changed.</small>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-2"></i>Save Changes
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
